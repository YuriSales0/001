<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="96" fill="#0B1E3A"/>

  <!-- HM Monogram scaled to fit -->
  <!-- Frame -->
  <rect x="56" y="56" width="400" height="400" rx="4" stroke="#F6F2EA" stroke-width="14" fill="none" stroke-linejoin="miter"/>

  <!-- H left vertical -->
  <rect x="120" y="110" width="18" height="270" fill="#F6F2EA"/>
  <!-- H right vertical -->
  <rect x="192" y="110" width="18" height="270" fill="#F6F2EA"/>
  <!-- H crossbar -->
  <rect x="120" y="232" width="90" height="18" fill="#F6F2EA"/>

  <!-- M left vertical -->
  <rect x="270" y="110" width="18" height="270" fill="#F6F2EA"/>
  <!-- M right vertical -->
  <rect x="390" y="110" width="18" height="270" fill="#F6F2EA"/>
  <!-- M left diagonal -->
  <polygon points="270,110 288,110 348,218 330,218" fill="#F6F2EA"/>
  <!-- M right diagonal -->
  <polygon points="408,110 390,110 330,218 348,218" fill="#F6F2EA"/>

  <!-- Meridian gold line -->
  <rect x="49" y="300" width="414" height="12" fill="#B08A3E" rx="2"/>
</svg>
